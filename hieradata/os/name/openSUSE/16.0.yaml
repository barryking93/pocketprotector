# hieradata/os/name/openSUSE/16.0.yaml

# puppet repos don't have 16.0 yet
pocketprotector::packages::repositories:
  puppet:
    name: puppet-release
    #baseurl: http://yum.puppet.com/puppet8/sles/$releasever_major/$basearch
    baseurl: http://yum.puppet.com/puppet8/sles/15/$basearch
    gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-2025-04-06-puppet-release
    enabled: 1
    gpgcheck: 1

pocketprotector::puppet::puppetdb::database::version: '14'
pocketprotector::puppet::server::puppetboard::python_version: '3.6'

puppetboard::python_version: '3.6'

python::pip::bootstrap::version: pip3
python::pip::bootstrap::manage_python: false
python::manage_pip_package: false

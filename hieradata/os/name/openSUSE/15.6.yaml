# hieradata/os/name/openSUSE/15.6.yaml

pocketprotector::packages::repositories:
  # update repos vanished in 16.0
  puppet:
    name: puppet-release
    baseurl: http://yum.puppet.com/puppet8/sles/$releasever_major/$basearch
    gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-2025-04-06-puppet-release
    enabled: 1
    gpgcheck: 1
  sle-backports-debug-update:
    enabled: 0
    autorefresh: 1
    baseurl: http://download.opensuse.org/update/leap/$releasever/backports_debug/
    type: NONE
    keeppackages: 0
  sle-backports-update:
    enabled: 1
    autorefresh: 1
    baseurl: http://download.opensuse.org/update/leap/$releasever/backports/
    path: /
    type: rpm-md
    keeppackages: 0
  sle-debug-update-non-oss:
    enabled: 0
    autorefresh: 1
    baseurl: http://download.opensuse.org/debug/update/leap/$releasever/non-oss/
    keeppackages: 0
  sle-debug-update:
    enabled: 0
    autorefresh: 1
    baseurl: http://download.opensuse.org/debug/update/leap/$releasever/oss/
    keeppackages: 0
  sle-debug-update:
    enabled: 0
    autorefresh: 1
    baseurl: http://download.opensuse.org/debug/update/leap/$releasever/sle/
    path: /
    type: rpm-md
    keeppackages: 0
  sle-update:
    enabled: 1
    autorefresh: 1
    baseurl: http://download.opensuse.org/update/leap/$releasever/sle/
    path: /
    type: rpm-md
    keeppackages: 0
  sle-update-non-oss:
    enabled: 1
    autorefresh: 1
    baseurl: http://download.opensuse.org/update/leap/$releasever/non-oss/
    path: /
    type: rpm-md
    keeppackages: 0
  sle-update-oss:
    enabled: 1
    autorefresh: 1
    baseurl: http://download.opensuse.org/update/leap/$releasever/oss
    path: /
    type: rpm-md
    keeppackages: 0

pocketprotector::puppet::puppetdb::database::version: '14'
pocketprotector::puppet::server::puppetboard::python_version: '3.6'

puppetboard::python_version: '3.6'

python::pip::bootstrap::version: pip3
python::pip::bootstrap::manage_python: false
python::manage_pip_package: false


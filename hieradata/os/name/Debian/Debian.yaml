# hieradata/os/name/Debian/Debian.yaml
#

pocketprotector::netsvc::ntp::packages:
  'chrony':
    ensure: present
pocketprotector::netsvc::ntp::servicename: chrony

pocketprotector::packages::repositories:
  debian:
    location: http://deb.debian.org/debian
    release: "%{facts.os.distro.codename}"
    repos: main contrib non-free-firmware
    key:
      name: debian-keyring.gpg
      source: '/usr/share/keyrings/debian-archive-keyring.pgp'
  debian-security:
    location: http://security.debian.org/debian-security/
    release: "%{facts.os.distro.codename}-security"
    repos: main contrib non-free-firmware
    key:
      name: debian-security-keyring.gpg
      source: '/usr/share/keyrings/debian-archive-keyring.pgp'

pocketprotector::puppet::client::configfile: /etc/puppet/puppet.conf
pocketprotector::puppet::client::configpuppetdb: /etc/puppet/puppetdb.conf


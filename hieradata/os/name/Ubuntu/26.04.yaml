# hieradata/os/name/Ubuntu/26.04.yaml

pocketprotector::gpu::nvidia::exec:
  'download and dearmor nvidia apt repository key':
    creates: /etc/apt/keyrings/nvidia.gpg
    command: 'curl -s https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2604/x86_64/Release.gpg | gpg --dearmor -o /etc/apt/keyrings/nvidia.gpg'
    path:
      - /usr/bin

pocketprotector::gpu::nvidia::packages:
  cuda:
    ensure: latest

pocketprotector::gpu::nvidia::repository:
  cuda:
    location: https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2604/x86_64/
    release: ''
    repos: /
    key:
      name: nvidia.gpg

